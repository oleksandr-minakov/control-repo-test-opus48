name: scan

# Daily re-scan of the most-recently-published image per (component, namespace).
# Scans BOTH namespaces so a regression is caught regardless of build path.
# Namespaces with no published image yet are skipped cleanly (found=false),
# never failing the run.
on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [kube-apiserver, kube-controller-manager, kube-scheduler, kube-proxy]
        namespace: [upstream-k8s, lts-k8s]
    steps:
      - name: Resolve latest tag for ${{ matrix.namespace }}/${{ matrix.component }}
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pkg="${{ matrix.namespace }}%2F${{ matrix.component }}"
          # newest version that has a non-candidate tag, then that tag
          tag="$(gh api "/users/oleksandr-minakov/packages/container/${pkg}/versions" \
                  --jq '[.[] | select(.metadata.container.tags
                                      | map(select(startswith("candidate-") | not)) | length > 0)]
                        | sort_by(.created_at) | last
                        | .metadata.container.tags
                        | map(select(startswith("candidate-") | not)) | .[0]' 2>/dev/null || true)"
          if [ -z "${tag:-}" ] || [ "$tag" = "null" ]; then
            echo "no published image for ${{ matrix.namespace }}/${{ matrix.component }} yet — skipping"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "latest tag: $tag"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install syft & grype
        if: steps.latest.outputs.found == 'true'
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh  | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Log in to ghcr.io
        if: steps.latest.outputs.found == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan ${{ matrix.namespace }}/${{ matrix.component }}:${{ steps.latest.outputs.tag }}
        if: steps.latest.outputs.found == 'true'
        run: |
          set -euo pipefail
          ref="ghcr.io/oleksandr-minakov/${{ matrix.namespace }}/${{ matrix.component }}:${{ steps.latest.outputs.tag }}"
          syft "$ref" -o cyclonedx-json=sbom.cdx.json
          grype "sbom:sbom.cdx.json" -o "sarif=grype.sarif"

      - name: Upload SARIF
        if: steps.latest.outputs.found == 'true'
        continue-on-error: true   # OS-package results may not map to file paths
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype.sarif
          category: scan-${{ matrix.namespace }}-${{ matrix.component }}
